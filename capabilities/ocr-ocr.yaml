naftiko: 1.0.0-alpha2
info:
  label: Mindee Ocr API — Ocr
  description: Mindee Ocr API — Ocr. 2 operations. Self-contained Naftiko capability covering one Mindee business surface.
  tags:
  - Mindee
  - Ocr
  - Document Parsing
  - OCR
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MINDEE_API_KEY: MINDEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ocr-ocr
    baseUri: https://api-v2.mindee.net
    description: Mindee Ocr API — Ocr business capability. Self-contained, no shared references.
    resources:
    - name: v2-products-ocr-enqueue
      path: /v2/products/ocr/enqueue
      operations:
      - name: mindee-enqueue-ocr-product-inference-v2-products-ocr-enqueue-post
        method: POST
        description: Mindee Send A File For An Ocr Utility Inference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: v2-products-ocr-results-inference-id
      path: /v2/products/ocr/results/{inference_id}
      operations:
      - name: mindee-get-ocr-product-result-v2-products-ocr-results--inference-id--get
        method: GET
        description: Mindee Get The Result Of A Completed Ocr Product Inference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: inference_id
          in: path
          type: string
          description: UUID of the inference to retrieve
          required: true
        - name: body
          in: body
          type: object
          description: Multipart form data including the file or URL and model identifier.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MINDEE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: ocr-ocr-rest
    port: 8080
    description: REST adapter for Mindee Ocr API — Ocr. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v2/products/ocr/enqueue
      name: v2-products-ocr-enqueue
      description: REST surface for v2-products-ocr-enqueue.
      operations:
      - method: POST
        name: mindee-enqueue-ocr-product-inference-v2-products-ocr-enqueue-post
        description: Mindee Send A File For An Ocr Utility Inference
        call: ocr-ocr.mindee-enqueue-ocr-product-inference-v2-products-ocr-enqueue-post
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/products/ocr/results/{inference_id}
      name: v2-products-ocr-results-inference-id
      description: REST surface for v2-products-ocr-results-inference-id.
      operations:
      - method: GET
        name: mindee-get-ocr-product-result-v2-products-ocr-results--inference-id--get
        description: Mindee Get The Result Of A Completed Ocr Product Inference
        call: ocr-ocr.mindee-get-ocr-product-result-v2-products-ocr-results--inference-id--get
        with:
          inference_id: rest.path.inference_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ocr-ocr-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mindee Ocr API — Ocr. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: mindee-enqueue-ocr-product-inference-v2-products-ocr-enqueue-post
      description: Mindee Send A File For An Ocr Utility Inference
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ocr-ocr.mindee-enqueue-ocr-product-inference-v2-products-ocr-enqueue-post
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: mindee-get-ocr-product-result-v2-products-ocr-results--inference-id--get
      description: Mindee Get The Result Of A Completed Ocr Product Inference
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ocr-ocr.mindee-get-ocr-product-result-v2-products-ocr-results--inference-id--get
      with:
        inference_id: tools.inference_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
