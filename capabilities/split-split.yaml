naftiko: 1.0.0-alpha2
info:
  label: Mindee Split API — Split
  description: Mindee Split API — Split. 2 operations. Self-contained Naftiko capability covering one Mindee business surface.
  tags:
  - Mindee
  - Split
  - Document Parsing
  - OCR
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MINDEE_API_KEY: MINDEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: split-split
    baseUri: https://api-v2.mindee.net
    description: Mindee Split API — Split business capability. Self-contained, no shared references.
    resources:
    - name: v2-products-split-enqueue
      path: /v2/products/split/enqueue
      operations:
      - name: mindee-enqueue-split-product-inference-v2-products-split-enqueue-post
        method: POST
        description: Mindee Send A File For A Split Utility Inference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Multipart form data including the file or URL and model identifier.
          required: true
    - name: v2-products-split-results-inference-id
      path: /v2/products/split/results/{inference_id}
      operations:
      - name: mindee-get-split-product-result-v2-products-split-results--inference-id--get
        method: GET
        description: Mindee Get The Result Of A Completed Split Product Inference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: inference_id
          in: path
          type: string
          description: UUID of the inference to retrieve
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MINDEE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: split-split-rest
    port: 8080
    description: REST adapter for Mindee Split API — Split. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/products/split/enqueue
      name: v2-products-split-enqueue
      description: REST surface for v2-products-split-enqueue.
      operations:
      - method: POST
        name: mindee-enqueue-split-product-inference-v2-products-split-enqueue-post
        description: Mindee Send A File For A Split Utility Inference
        call: split-split.mindee-enqueue-split-product-inference-v2-products-split-enqueue-post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/products/split/results/{inference_id}
      name: v2-products-split-results-inference-id
      description: REST surface for v2-products-split-results-inference-id.
      operations:
      - method: GET
        name: mindee-get-split-product-result-v2-products-split-results--inference-id--get
        description: Mindee Get The Result Of A Completed Split Product Inference
        call: split-split.mindee-get-split-product-result-v2-products-split-results--inference-id--get
        with:
          inference_id: rest.path.inference_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: split-split-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mindee Split API — Split. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: mindee-enqueue-split-product-inference-v2-products-split-enqueue-post
      description: Mindee Send A File For A Split Utility Inference
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: split-split.mindee-enqueue-split-product-inference-v2-products-split-enqueue-post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mindee-get-split-product-result-v2-products-split-results--inference-id--get
      description: Mindee Get The Result Of A Completed Split Product Inference
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: split-split.mindee-get-split-product-result-v2-products-split-results--inference-id--get
      with:
        inference_id: tools.inference_id
      outputParameters:
      - type: object
        mapping: $.
